name: Extract Spotify Playlist

on:
  repository_dispatch:
    types: [extract-spotify]

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Parse Spotify URL
        id: parse
        run: |
          URL="${{ github.event.client_payload.url }}"
          # Extract type and id from open.spotify.com links
          TYPE=$(echo "$URL" | sed -n 's|.*open\.spotify\.com/\(track\|album\|playlist\)/\([a-zA-Z0-9]*\).*|\1|p')
          ID=$(echo "$URL" | sed -n 's|.*open\.spotify\.com/\(track\|album\|playlist\)/\([a-zA-Z0-9]*\).*|\2|p')
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Fetch Spotify embed page and extract tracks
        id: extract
        run: |
          TYPE="${{ steps.parse.outputs.type }}"
          ID="${{ steps.parse.outputs.id }}"
          EMBED_URL="https://open.spotify.com/embed/$TYPE/$ID"

          # Download the embed page (lightweight, always contains __NEXT_DATA__)
          curl -s -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "$EMBED_URL" -o embed.html

          # Extract the JSON blob from __NEXT_DATA__
          python3 -c "
          import re, json
          with open('embed.html', 'r') as f:
              html = f.read()
          m = re.search(r'<script id=\"__NEXT_DATA__\" type=\"application/json\">([\s\S]*?)</script>', html)
          if not m:
              raise ValueError('No __NEXT_DATA__ found')
          data = json.loads(m.group(1))
          tracks = []
          if TYPE == 'track':
              t = data['props']['pageProps'].get('track')
              if t:
                  tracks.append({'name': t['name'], 'artist': ', '.join(a['name'] for a in t.get('artists', []))})
          elif TYPE == 'album':
              album = data['props']['pageProps'].get('album')
              if album and album.get('tracks', {}).get('items'):
                  for item in album['tracks']['items']:
                      if 'track' in item:
                          t = item['track']
                          tracks.append({'name': t['name'], 'artist': ', '.join(a['name'] for a in t.get('artists', []))})
          elif TYPE == 'playlist':
              playlist = data['props']['pageProps'].get('playlist')
              if playlist and playlist.get('tracks', {}).get('items'):
                  for item in playlist['tracks']['items']:
                      if 'track' in item:
                          t = item['track']
                          tracks.append({'name': t['name'], 'artist': ', '.join(a['name'] for a in t.get('artists', []))})
          with open('tracks.json', 'w') as out:
              json.dump(tracks[:50], out)   # cap at 50 tracks
          print(f'Extracted {len(tracks[:50])} tracks')
          "

      - name: Create Release with track list
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ github.event.client_payload.request_id }}"
          name: "Spotify Playlist Data"
          files: tracks.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
