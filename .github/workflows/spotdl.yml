name: Full Track Download & Drive Upload

on:
  repository_dispatch:
    types: [download-music]

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ytmdl
        run: |
          pip install ytmdl
          pip install --upgrade yt-dlp

      - name: Download track from YouTube with iTunes metadata
        run: ytmdl "${{ github.event.client_payload.search_query }}" --output-format mp3

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@v1
        with:
          credentials: ${{ secrets.DRIVE_SERVICE_JSON }}
          filename: "*.mp3"
          folderId: ${{ secrets.DRIVE_FOLDER_ID }}
          name: "${{ github.event.client_payload.search_query }}.mp3"
          overwrite: "true"
