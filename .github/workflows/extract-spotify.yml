name: Extract Spotify Playlist

on:
  repository_dispatch:
    types: [extract-spotify]

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Parse Spotify URL
        id: parse
        run: |
          URL="${{ github.event.client_payload.url }}"
          TYPE=$(echo "$URL" | grep -oP '(?<=open\.spotify\.com/)(track|album|playlist)/[^?]+' | cut -d'/' -f1)
          ID=$(echo "$URL" | grep -oP '(?<=open\.spotify\.com/)(track|album|playlist)/[^?]+' | cut -d'/' -f2)
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Fetch embed page and extract tracks
        run: |
          TYPE="${{ steps.parse.outputs.type }}"
          ID="${{ steps.parse.outputs.id }}"
          EMBED="https://open.spotify.com/embed/$TYPE/$ID"

          # Download embed page
          curl -s -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "$EMBED" -o embed.html

          # Python script that extracts tracks directly
          python3 << 'EOF'
          import re, json, sys

          with open('embed.html', 'r') as f:
              html = f.read()

          # Find __NEXT_DATA__ script tag
          match = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.*?)</script>', html)
          if not match:
              sys.exit("No __NEXT_DATA__ found")

          data = json.loads(match.group(1))
          tracks = []

          type_ = "${{ steps.parse.outputs.type }}"
          if type_ == 'track':
              t = data['props']['pageProps'].get('track')
              if t:
                  artists = ', '.join(a['name'] for a in t.get('artists', []))
                  tracks.append({'name': t['name'], 'artist': artists})
          elif type_ == 'album':
              album = data['props']['pageProps'].get('album')
              if album and album.get('tracks', {}).get('items'):
                  for item in album['tracks']['items']:
                      t = item.get('track')
                      if t:
                          artists = ', '.join(a['name'] for a in t.get('artists', []))
                          tracks.append({'name': t['name'], 'artist': artists})
          elif type_ == 'playlist':
              playlist = data['props']['pageProps'].get('playlist')
              if playlist and playlist.get('tracks', {}).get('items'):
                  for item in playlist['tracks']['items']:
                      t = item.get('track')
                      if t:
                          artists = ', '.join(a['name'] for a in t.get('artists', []))
                          tracks.append({'name': t['name'], 'artist': artists})

          with open('tracks.json', 'w') as out:
              json.dump(tracks[:50], out)   # cap at 50

          print(f"Extracted {len(tracks[:50])} tracks")
          EOF

      - name: Create Release with track list
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ github.event.client_payload.request_id }}"
          name: "Spotify Playlist Data"
          files: tracks.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
