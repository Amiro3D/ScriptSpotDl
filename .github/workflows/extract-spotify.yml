name: Extract Spotify Playlist

on:
  repository_dispatch:
    types: [extract-spotify]

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Parse Spotify URL and extract tracks
        id: extract
        run: |
          URL="${{ github.event.client_payload.url }}"
          REQUEST_ID="${{ github.event.client_payload.request_id }}"

          # Extract type and id from URL
          TYPE=$(echo "$URL" | sed -n 's|.*open\.spotify\.com/\(track\|album\|playlist\)/\([a-zA-Z0-9]*\).*|\1|p')
          ID=$(echo "$URL" | sed -n 's|.*open\.spotify\.com/\(track\|album\|playlist\)/\([a-zA-Z0-9]*\).*|\2|p')
          EMBED_URL="https://open.spotify.com/embed/$TYPE/$ID"

          # Fetch the embed page
          curl -s -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "$EMBED_URL" -o embed.html

          # Extract __NEXT_DATA__ JSON and build tracks.json using jq only
          if [ "$TYPE" = "track" ]; then
            jq '[{
              name: .props.pageProps.track.name,
              artist: (.props.pageProps.track.artists // [] | map(.name) | join(", "))
            }]' <(grep -oP '__NEXT_DATA__.*?>(.*?)</script>' embed.html | sed 's/__NEXT_DATA__.*>//;s/<\/script>//' | jq 'fromjson') > tracks.json 2>/dev/null || echo '[]' > tracks.json
          elif [ "$TYPE" = "album" ]; then
            jq '[.props.pageProps.album.tracks.items[].track | {name: .name, artist: (.artists // [] | map(.name) | join(", "))}]' <(grep -oP '__NEXT_DATA__.*?>(.*?)</script>' embed.html | sed 's/__NEXT_DATA__.*>//;s/<\/script>//' | jq 'fromjson') > tracks.json 2>/dev/null || echo '[]' > tracks.json
          elif [ "$TYPE" = "playlist" ]; then
            jq '[.props.pageProps.playlist.tracks.items[].track | {name: .name, artist: (.artists // [] | map(.name) | join(", "))}]' <(grep -oP '__NEXT_DATA__.*?>(.*?)</script>' embed.html | sed 's/__NEXT_DATA__.*>//;s/<\/script>//' | jq 'fromjson') > tracks.json 2>/dev/null || echo '[]' > tracks.json
          else
            echo '[]' > tracks.json
          fi

          echo "track_count=$(jq length tracks.json)" >> $GITHUB_OUTPUT

      - name: Create Release with track list
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ github.event.client_payload.request_id }}"
          name: "Spotify Playlist Data"
          files: tracks.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
