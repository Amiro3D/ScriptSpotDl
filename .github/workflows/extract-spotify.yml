name: Extract Spotify Playlist

on:
  repository_dispatch:
    types: [extract-spotify]

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository (for cookies.txt)
        uses: actions/checkout@v4

      - name: Verify cookies.txt exists
        run: |
          if [ ! -f cookies.txt ]; then
            echo "❌ cookies.txt not found! Please commit a valid YouTube cookies file."
            exit 1
          fi

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Extract track info from Spotify URL
        id: extract
        run: |
          URL="${{ github.event.client_payload.url }}"
          REQUEST_ID="${{ github.event.client_payload.request_id }}"

          # --flat-playlist: only list playlist items, no DRM check
          # --dump-json: output a JSON object per line with title and artist
          yt-dlp \
            --flat-playlist \
            --playlist-items 1-50 \
            --dump-json \
            --cookies cookies.txt \
            "$URL" > raw.jsonl 2>/dev/null || true

          # Build a clean JSON array of {name, artist} objects
          if [ -s raw.jsonl ]; then
            jq -s '[.[] | {name: .title, artist: (.artist // "Unknown")}]' raw.jsonl > tracks.json
          else
            echo '[]' > tracks.json
          fi

          echo "track_count=$(jq length tracks.json)" >> $GITHUB_OUTPUT

      - name: Create Release with track list
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ github.event.client_payload.request_id }}"
          name: "Spotify Playlist Data"
          files: tracks.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
